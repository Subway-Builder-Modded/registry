name: Auto-Approve Bot PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-approve:
    if: >
      github.event.pull_request.draft == false &&
      startsWith(github.event.pull_request.head.ref, 'bot/') &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login == 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      BOT_REVIEWER_TOKEN: ${{ secrets.BOT_REVIEWER_TOKEN }}
    steps:
      - name: Skip when bot reviewer token is missing
        if: ${{ env.BOT_REVIEWER_TOKEN == '' }}
        run: echo "BOT_REVIEWER_TOKEN is not configured; skipping auto-approval."

      - name: Auto-approve pull request
        if: ${{ env.BOT_REVIEWER_TOKEN != '' }}
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ env.BOT_REVIEWER_TOKEN }}
