name: Auto-Approve GitHub Actions PRs

on:
  repository_dispatch:
    types: [auto-approve-actions-bot-pr]
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: Pull request number to review/approve
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    env:
      BOT_APPROVAL_PAT: ${{ secrets.BOT_APPROVAL_PAT }}
      PR_NUMBER_FROM_DISPATCH: ${{ github.event.client_payload.pull_request_number }}
      PR_NUMBER_FROM_INPUT: ${{ inputs.pull_request_number }}
    steps:
      - name: Skip when approval token is missing
        if: ${{ env.BOT_APPROVAL_PAT == '' }}
        run: echo "BOT_APPROVAL_PAT is not configured; skipping auto-approval."

      - name: Auto-approve trusted bot PR
        if: ${{ env.BOT_APPROVAL_PAT != '' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ env.BOT_APPROVAL_PAT }}
          script: |
            const repo = context.repo.repo;
            const owner = context.repo.owner;
            const rawPrNumber = process.env.PR_NUMBER_FROM_DISPATCH || process.env.PR_NUMBER_FROM_INPUT;
            if (!rawPrNumber) {
              core.setFailed("Missing pull request number (client_payload.pull_request_number or workflow_dispatch input).");
              return;
            }
            const pull_number = Number(rawPrNumber);
            if (!Number.isInteger(pull_number) || pull_number <= 0) {
              core.setFailed(`Invalid pull request number: ${rawPrNumber}`);
              return;
            }

            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number });

            const isTrusted = (
              pr.user?.login === "github-actions[bot]"
              && pr.draft === false
              && typeof pr.head?.ref === "string"
              && pr.head.ref.startsWith("bot/")
              && pr.head?.repo?.full_name === `${owner}/${repo}`
            );
            if (!isTrusted) {
              core.info(
                `PR #${pull_number} is not an eligible github-actions bot PR (author=${pr.user?.login}, draft=${pr.draft}, headRef=${pr.head?.ref}, headRepo=${pr.head?.repo?.full_name}). Skipping approval.`,
              );
              return;
            }

            await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number,
              event: "APPROVE",
              body: "Automated approval for trusted github-actions[bot] PR.",
            });
            core.info(`Approved PR #${pull_number}.`);
