name: Auto-Approve GitHub Actions PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-approve:
    if: >
      github.event.pull_request.draft == false &&
      startsWith(github.event.pull_request.head.ref, 'bot/') &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login == 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      BOT_APPROVAL_PAT: ${{ secrets.BOT_APPROVAL_PAT }}
    steps:
      - name: Skip when approval token is missing
        if: ${{ env.BOT_APPROVAL_PAT == '' }}
        run: echo "BOT_APPROVAL_PAT is not configured; skipping auto-approval."

      - name: Auto-approve PR
        if: ${{ env.BOT_APPROVAL_PAT != '' }}
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ env.BOT_APPROVAL_PAT }}
