name: Cache Download History

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: cache-download-history
  cancel-in-progress: false

jobs:
  cache-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore missing cached snapshots from bot branch
        run: |
          if git ls-remote --exit-code --heads origin bot/cache-download-history >/dev/null 2>&1; then
            git fetch origin bot/cache-download-history:refs/remotes/origin/bot/cache-download-history
            while IFS= read -r path; do
              if [ -f "$path" ]; then
                continue
              fi
              mkdir -p "$(dirname "$path")"
              git show "origin/bot/cache-download-history:$path" > "$path"
            done < <(
              git ls-tree -r --name-only origin/bot/cache-download-history -- \
                'history/snapshot_*.json' \
                'history/download_attribution_*.json' \
                'history/discord_server_metrics.json'
            )
          else
            echo "No bot/cache-download-history branch found; using history from checked out ref."
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: scripts/pnpm-lock.yaml

      - name: Install script dependencies
        run: pnpm install --frozen-lockfile
        working-directory: scripts

      - name: Generate download history snapshot
        id: generate_history
        run: pnpm --dir scripts run generate-download-history

      - name: Capture Discord server metrics
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: pnpm --dir scripts run capture-discord-server-metrics

      - name: Summarize Discord server metrics
        id: discord_metrics
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const historyPath = "history/discord_server_metrics.json";
          const outputPath = process.env.GITHUB_OUTPUT;

          function appendOutput(name, value) {
            fs.appendFileSync(outputPath, `${name}=${value}\n`, "utf8");
          }

          if (!fs.existsSync(historyPath)) {
            appendOutput("summary_line", "- **Discord server:** metrics unavailable");
            appendOutput("total_users", "");
            appendOutput("daily_delta", "");
            process.exit(0);
          }

          const history = JSON.parse(fs.readFileSync(historyPath, "utf8"));
          const snapshots = Object.entries(history.snapshots ?? {})
            .filter(([, snapshot]) => snapshot && typeof snapshot === "object" && Number.isFinite(snapshot.total_users))
            .sort(([a], [b]) => Date.parse(a) - Date.parse(b));
          const userDays = history.user_days && typeof history.user_days === "object"
            ? history.user_days
            : {};

          if (snapshots.length === 0) {
            appendOutput("summary_line", "- **Discord server:** metrics unavailable");
            appendOutput("total_users", "");
            appendOutput("daily_delta", "");
            process.exit(0);
          }

          const latestByDay = new Map();
          for (const [snapshotKey, snapshot] of snapshots) {
            const parsed = Date.parse(snapshotKey);
            if (!Number.isFinite(parsed)) continue;
            latestByDay.set(new Date(parsed).toISOString().slice(0, 10), snapshot);
          }

          const dayKeys = [...latestByDay.keys()].sort();
          const latestDay = dayKeys[dayKeys.length - 1];
          const previousDay = dayKeys.length > 1 ? dayKeys[dayKeys.length - 2] : null;
          const latestSnapshot = latestByDay.get(latestDay);
          const latestTotal = latestSnapshot?.total_users;

          if (!Number.isFinite(latestTotal)) {
            appendOutput("summary_line", "- **Discord server:** metrics unavailable");
            appendOutput("total_users", "");
            appendOutput("daily_delta", "");
            process.exit(0);
          }

          let summaryLine = `- **Discord server:** now at ${latestTotal} members`;
          let dailyDelta = "";
          const latestActivity = userDays[latestDay] && typeof userDays[latestDay] === "object"
            ? userDays[latestDay]
            : { users_joined: 0, users_left: 0 };
          const latestJoined = Number.isFinite(latestActivity.users_joined) ? latestActivity.users_joined : 0;
          const latestLeft = Number.isFinite(latestActivity.users_left) ? latestActivity.users_left : 0;

          if (latestJoined > 0 || latestLeft > 0) {
            summaryLine += `, ${latestJoined} joined / ${latestLeft} left`;
          }

          if (previousDay) {
            const previousTotal = latestByDay.get(previousDay)?.total_users;
            if (Number.isFinite(previousTotal)) {
              const delta = latestTotal - previousTotal;
              dailyDelta = String(delta);
              if (delta > 0) {
                summaryLine += `, up +${delta} vs yesterday`;
              } else if (delta < 0) {
                summaryLine += `, down ${delta} vs yesterday`;
              } else {
                summaryLine += ", flat vs yesterday";
              }
            }
          } else {
            summaryLine += " (first recorded snapshot)";
          }

          appendOutput("summary_line", summaryLine);
          appendOutput("total_users", String(latestTotal));
          appendOutput("daily_delta", dailyDelta);
          NODE

      - name: Validate generated snapshot totals against current downloads
        env:
          SNAPSHOT_FILE: ${{ steps.generate_history.outputs.snapshot_file }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          function readJson(path) {
            return JSON.parse(fs.readFileSync(path, "utf8"));
          }

          function sumDownloads(downloads) {
            let total = 0;
            for (const versions of Object.values(downloads ?? {})) {
              if (!versions || typeof versions !== "object") continue;
              for (const count of Object.values(versions)) {
                if (typeof count === "number" && Number.isFinite(count)) {
                  total += count;
                }
              }
            }
            return total;
          }

          const snapshot = readJson(process.env.SNAPSHOT_FILE);
          const mapsDownloads = readJson("maps/downloads.json");
          const modsDownloads = readJson("mods/downloads.json");
          const mapsTotal = sumDownloads(mapsDownloads);
          const modsTotal = sumDownloads(modsDownloads);
          const total = mapsTotal + modsTotal;

          if (snapshot.maps?.total_downloads !== mapsTotal) {
            throw new Error(`Snapshot maps total mismatch: snapshot=${snapshot.maps?.total_downloads} current=${mapsTotal}`);
          }
          if (snapshot.mods?.total_downloads !== modsTotal) {
            throw new Error(`Snapshot mods total mismatch: snapshot=${snapshot.mods?.total_downloads} current=${modsTotal}`);
          }
          if (snapshot.total_downloads !== total) {
            throw new Error(`Snapshot overall total mismatch: snapshot=${snapshot.total_downloads} current=${total}`);
          }
          NODE

      - name: Validate only today's history snapshots changed
        run: |
          EXPECTED_DOWNLOAD_SNAPSHOT="${{ steps.generate_history.outputs.snapshot_file }}"
          EXPECTED_ATTRIBUTION_SNAPSHOT="${{ steps.generate_history.outputs.attribution_snapshot_file }}"
          mapfile -t CHANGED_HISTORY < <(git diff --name-only -- history)
          for path in "${CHANGED_HISTORY[@]}"; do
            if [ "$path" != "$EXPECTED_DOWNLOAD_SNAPSHOT" ] && [ "$path" != "$EXPECTED_ATTRIBUTION_SNAPSHOT" ] && [ "$path" != "history/discord_server_metrics.json" ]; then
              echo "Unexpected history change detected: $path"
              exit 1
            fi
          done

      - name: Generate analytics CSVs
        run: pnpm --dir scripts run analytics -- --top-k-listings 0 --top-k-authors 0

      - name: Generate Discord server analytics
        run: pnpm --dir scripts run generate-discord-server-analytics

      - name: Stage snapshot changes
        id: commit_changes
        run: |
          git add history/snapshot_*.json history/download_attribution_*.json history/discord_server_metrics.json analytics/*.csv 2>/dev/null || true
          git add -A analytics/discord_users_by_day.csv analytics/discord_server_by_day.csv 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No history snapshot/analytics changes detected; skipping PR update."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "commit_sha=" >> "$GITHUB_OUTPUT"
            echo "pull_request_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Create or update bot PR
        id: create_pr
        if: ${{ steps.commit_changes.outputs.committed == 'true' }}
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: cache download history snapshot"
          branch: bot/cache-download-history
          delete-branch: true
          add-paths: |
            history/snapshot_*.json
            history/download_attribution_*.json
            history/discord_server_metrics.json
            analytics/*.csv
            analytics/discord_users_by_day.csv
            analytics/discord_server_by_day.csv
          title: "chore: cache download history snapshot"
          body: "Automated update from cache-download-history workflow."

      - name: Finalize bot PR automation
        id: bot_pr
        if: ${{ steps.commit_changes.outputs.committed == 'true' }}
        uses: ./.github/actions/bot-pr-automation
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo: ${{ github.repository }}
          bot_branch: bot/cache-download-history
          pr_number: ${{ steps.create_pr.outputs.pull-request-number }}
          pr_url: ${{ steps.create_pr.outputs.pull-request-url }}
          pr_head_sha: ${{ steps.create_pr.outputs.pull-request-head-sha }}
          source_workflow: ${{ github.workflow }}
          source_run_id: ${{ github.run_id }}

      - name: Finalize change outputs
        id: finalize_changes
        run: |
          if [ "${{ steps.commit_changes.outputs.committed }}" != "true" ]; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "commit_sha=" >> "$GITHUB_OUTPUT"
            echo "pull_request_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HEAD_SHA="${{ steps.bot_pr.outputs.pr_head_sha }}"
          echo "committed=true" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${HEAD_SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "pull_request_url=${{ steps.bot_pr.outputs.pr_url }}" >> "$GITHUB_OUTPUT"

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_TITLE: Cache Download History
          DISCORD_STATUS: ${{ job.status }}
          DISCORD_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SNAPSHOT_FILE: ${{ steps.generate_history.outputs.snapshot_file }}
          PREVIOUS_SNAPSHOT_FILE: ${{ steps.generate_history.outputs.previous_snapshot_file }}
          ATTRIBUTION_SNAPSHOT_FILE: ${{ steps.generate_history.outputs.attribution_snapshot_file }}
          ATTRIBUTION_PREVIOUS_SNAPSHOT_FILE: ${{ steps.generate_history.outputs.attribution_previous_snapshot_file }}
          ATTRIBUTION_TOTAL_FETCHES: ${{ steps.generate_history.outputs.attribution_total_fetches }}
          ATTRIBUTION_NET_FETCHES: ${{ steps.generate_history.outputs.attribution_net_fetches }}
          ATTRIBUTION_DAILY_FETCHES: ${{ steps.generate_history.outputs.attribution_daily_fetches }}
          MAPS_TOTAL_DOWNLOADS: ${{ steps.generate_history.outputs.maps_total_downloads }}
          MAPS_NET_DOWNLOADS: ${{ steps.generate_history.outputs.maps_net_downloads }}
          MAPS_ENTRIES: ${{ steps.generate_history.outputs.maps_entries }}
          MODS_TOTAL_DOWNLOADS: ${{ steps.generate_history.outputs.mods_total_downloads }}
          MODS_NET_DOWNLOADS: ${{ steps.generate_history.outputs.mods_net_downloads }}
          MODS_ENTRIES: ${{ steps.generate_history.outputs.mods_entries }}
          WARNINGS_JSON: ${{ steps.generate_history.outputs.warnings_json }}
          DISCORD_SERVER_SUMMARY_LINE: ${{ steps.discord_metrics.outputs.summary_line }}
          COMMITTED: ${{ steps.finalize_changes.outputs.committed }}
          COMMIT_SHA: ${{ steps.finalize_changes.outputs.commit_sha }}
          PULL_REQUEST_URL: ${{ steps.finalize_changes.outputs.pull_request_url }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL not set; skipping Discord notification."
            exit 0
          fi

          COMMIT_DISPLAY="none (no file changes)"
          if [ "${COMMITTED}" = "true" ]; then
            if [ -n "${PULL_REQUEST_URL}" ]; then
              COMMIT_DISPLAY="[bot PR](${PULL_REQUEST_URL})"
            elif [ -n "${COMMIT_SHA}" ]; then
              COMMIT_DISPLAY="\`${COMMIT_SHA}\`"
            fi
          fi
          PREVIOUS_DISPLAY="${PREVIOUS_SNAPSHOT_FILE:-none}"
          ATTR_PREVIOUS_DISPLAY="${ATTRIBUTION_PREVIOUS_SNAPSHOT_FILE:-none}"

          export DISCORD_WARNINGS_JSON="${WARNINGS_JSON:-[]}"
          export DISCORD_LINES_JSON="$(jq -nc \
            --arg snapshot_file "${SNAPSHOT_FILE}" \
            --arg previous_snapshot_file "${PREVIOUS_DISPLAY}" \
            --arg attribution_snapshot_file "${ATTRIBUTION_SNAPSHOT_FILE}" \
            --arg attribution_previous_snapshot_file "${ATTR_PREVIOUS_DISPLAY}" \
            --arg attribution_total_fetches "${ATTRIBUTION_TOTAL_FETCHES}" \
            --arg attribution_net_fetches "${ATTRIBUTION_NET_FETCHES}" \
            --arg attribution_daily_fetches "${ATTRIBUTION_DAILY_FETCHES}" \
            --arg maps_total "${MAPS_TOTAL_DOWNLOADS}" \
            --arg maps_net "${MAPS_NET_DOWNLOADS}" \
            --arg maps_entries "${MAPS_ENTRIES}" \
            --arg mods_total "${MODS_TOTAL_DOWNLOADS}" \
            --arg mods_net "${MODS_NET_DOWNLOADS}" \
            --arg mods_entries "${MODS_ENTRIES}" \
            --arg discord_server_summary_line "${DISCORD_SERVER_SUMMARY_LINE}" \
            --arg commit_display "${COMMIT_DISPLAY}" \
            '[
              "- **Snapshot:** \($snapshot_file)",
              "- **Previous snapshot:** \($previous_snapshot_file)",
              "- **Attribution snapshot:** \($attribution_snapshot_file)",
              "- **Attribution previous snapshot:** \($attribution_previous_snapshot_file)",
              "- **Attribution fetches:** total=\($attribution_total_fetches), net=\($attribution_net_fetches), daily=\($attribution_daily_fetches)",
              "- **Maps:** total=\($maps_total), net=\($maps_net), entries=\($maps_entries)",
              "- **Mods:** total=\($mods_total), net=\($mods_net), entries=\($mods_entries)",
              $discord_server_summary_line,
              "- **Commit:** \($commit_display)"
            ]')"

          pnpm --dir scripts run notify-discord
