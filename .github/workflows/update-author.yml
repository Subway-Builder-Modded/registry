name: Update Author Profile

on:
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update-author:
    if: >-
      contains(github.event.issue.labels.*.name, 'update-author') && (
        github.event_name == 'issues' ||
        (github.event_name == 'issue_comment' &&
         contains(github.event.comment.body, 'revalidate') &&
         (github.event.comment.user.id == github.event.issue.user.id ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'COLLABORATOR'))
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: scripts/pnpm-lock.yaml

      - name: Install script dependencies
        run: pnpm install --frozen-lockfile
        working-directory: scripts

      - name: Acknowledge revalidation
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Parse issue body
        id: parser
        uses: stefanbuck/github-issue-parser@v3
        with:
          template-path: .github/ISSUE_TEMPLATE/update-author.yml
          issue-body: ${{ github.event.issue.body }}

      - name: Validate author update
        env:
          ISSUE_JSON: ${{ steps.parser.outputs.jsonString }}
          ISSUE_AUTHOR_ID: ${{ github.event.issue.user.id }}
        run: pnpm --dir scripts run validate-author-update

      - name: Update author profile
        env:
          ISSUE_JSON: ${{ steps.parser.outputs.jsonString }}
          ISSUE_AUTHOR_ID: ${{ github.event.issue.user.id }}
          ISSUE_AUTHOR_LOGIN: ${{ github.event.issue.user.login }}
        run: pnpm --dir scripts run update-author

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "update/author/${{ github.event.issue.user.login }}"
          git add -A
          git commit -m "feat(authors): update profile for ${{ github.event.issue.user.login }}"
          git push --force origin "update/author/${{ github.event.issue.user.login }}"

      - name: Create or update pull request
        uses: actions/github-script@v7
        with:
          script: |
            const branch = 'update/author/${{ github.event.issue.user.login }}';
            const { data: existing } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open'
            });
            if (existing.length > 0) {
              console.log(`PR #${existing[0].number} already exists — updated via force push`);
              return;
            }
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'feat(authors): update profile for ${{ github.event.issue.user.login }}',
              body: [
                'Fixes #${{ github.event.issue.number }}',
                '',
                'Automated PR to update author profile for @${{ github.event.issue.user.login }}.',
                '',
                'Submitted by @${{ github.event.issue.user.login }}'
              ].join('\n'),
              head: branch,
              base: 'main'
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['automated-pr']
            });

      - name: Handle success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'failed-validation'
              });
            } catch {}

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'A pull request has been created for your author profile update. A maintainer will review it shortly.'
            });

      - name: Handle failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let errorMsg;
            try {
              errorMsg = fs.readFileSync('scripts/validation-error.md', 'utf-8');
            } catch {
              errorMsg = 'Something went wrong while processing your update request. Please check the [workflow logs](' +
                `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`;
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['failed-validation']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: errorMsg + '\n\n---\nEdit your issue to fix the problems above, then comment **revalidate** to try again.'
            });
